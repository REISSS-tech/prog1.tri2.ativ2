<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>debugger</title>
</head>
<body>
    <div>
        <input name="url">
        <select name="method">
            <option>GET</option>
             <option>PUT</option>
              <option>POST</option>
               <option>DELETE</option>
        </select>
        <textarea name="header"></textarea>
        <textarea name="body"></textarea>
        <button id="bt-execute">execute</button>
    </div>
    <pre id="response">response goes here... </pre>
    <script>
        const elurl= document.querySelector(`[name""url"]`)
        const elMethod= document.querySelector(`[name""method"]`)
        const elhaders= document.querySelector(`[name""haders"]`)
        const elBody= document.querySelector(`[name""body"]`)
        const btExec= document.querySelector(`#bt-execute`)
        const elreponse= document.querySelector(`#response`)
        BtnExec.addEventListener(`click`, async () =>{
            if (elurl.value.trim() === "")
            return
            const request= await fetch(elurl.value, {
            method: elMethod.value,
            //haders: elhaders.value,
            body: elBody.value.trim() == '' ? underfined: elBody.value
            })
            const response = await request.text()
            elresponse.innerHTML = response
        })
    </script>
</body>
</html>
